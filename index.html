<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>قسم الانجليزي - الاختبارات</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
        }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background-color: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 900px;
            padding: 30px;
            backdrop-filter: blur(10px);
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 2.5em;
            border-bottom: 3px solid #764ba2;
            padding-bottom: 10px;
        }
        h2 {
            color: #555;
            margin-bottom: 20px;
            text-align: center;
        }
        /* شاشة القائمة الرئيسية */
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .menu-btn {
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 25px 15px;
            font-size: 1.3em;
            font-weight: bold;
            border-radius: 15px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            border: 2px solid transparent;
        }
        .menu-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            border-color: white;
        }
        .menu-btn.special {
            background: linear-gradient(45deg, #f093fb, #f5576c);
            grid-column: span 2;
        }
        /* شاشة الاختبار */
        .quiz-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            background-color: #f0f0f0;
            padding: 15px;
            border-radius: 50px;
        }
        .progress {
            font-size: 1.2em;
            font-weight: bold;
            color: #555;
        }
        .back-btn {
            background-color: #764ba2;
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 1em;
            font-weight: bold;
            transition: background-color 0.2s;
        }
        .back-btn:hover {
            background-color: #5a3d80;
        }
        .question-box {
            background-color: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        .question-text {
            font-size: 1.4em;
            color: #333;
            margin-bottom: 25px;
            line-height: 1.6;
            font-weight: 500;
        }
        .options-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }
        .option-btn {
            background-color: #f8f9fa;
            border: 2px solid #dee2e6;
            padding: 15px;
            border-radius: 10px;
            font-size: 1.1em;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
            font-weight: 500;
            color: #495057;
        }
        .option-btn:hover:not(:disabled) {
            background-color: #e9ecef;
            border-color: #adb5bd;
        }
        .option-btn.selected {
            background-color: #667eea;
            border-color: #764ba2;
            color: white;
        }
        .nav-buttons {
            display: flex;
            justify-content: flex-start; /* محاذاة لليسار (يمين عربي) */
            margin-top: 20px;
        }
        .nav-btn {
            background-color: #6c757d;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 50px;
            font-size: 1.1em;
            cursor: pointer;
            transition: background-color 0.2s;
            font-weight: bold;
            min-width: 120px;
        }
        .nav-btn:hover:not(:disabled) {
            background-color: #5a6268;
        }
        .nav-btn:disabled {
            background-color: #ced4da;
            cursor: not-allowed;
            opacity: 0.5;
        }
        /* شاشة النتيجة */
        .result-box {
            background-color: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .score-card {
            text-align: center;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 30px;
        }
        .score-number {
            font-size: 4em;
            font-weight: bold;
            display: block;
        }
        .score-text {
            font-size: 1.5em;
        }
        .answers-review {
            margin-top: 20px;
        }
        .review-item {
            padding: 15px;
            border-bottom: 1px solid #eee;
            margin-bottom: 10px;
        }
        .review-item.correct {
            border-right: 5px solid #28a745;
            background-color: #f0fff4;
        }
        .review-item.incorrect {
            border-right: 5px solid #dc3545;
            background-color: #fff5f5;
        }
        .user-answer {
            font-weight: bold;
        }
        .correct-answer {
            color: #28a745;
            font-weight: bold;
        }
        .wrong-answer {
            color: #dc3545;
            font-weight: bold;
        }
        .footer-note {
            text-align: center;
            margin-top: 30px;
            color: #666;
            font-size: 0.9em;
        }
        .hidden {
            display: none;
        }
        /* رسالة عند الانتهاء */
        .completion-message {
            text-align: center;
            color: #28a745;
            font-size: 1.2em;
            margin-top: 15px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container" id="app">
        <!-- شاشة القائمة الرئيسية -->
        <div id="menuScreen">
            <h1>🏫 قسم الانجليزي</h1>
            <h2>اختر الاختبار الذي تريد</h2>
            <div class="menu-grid">
                <button class="menu-btn" onclick="startUnit(0)">الوحدة الأولى</button>
                <button class="menu-btn" onclick="startUnit(1)">الوحدة الثانية</button>
                <button class="menu-btn" onclick="startUnit(2)">الوحدة الثالثة</button>
                <button class="menu-btn" onclick="startUnit(3)">الوحدة الرابعة</button>
                <button class="menu-btn" onclick="startUnit(4)">الوحدة الخامسة</button>
                <button class="menu-btn special" onclick="startComprehensive()">📝 الامتحان الشامل (50 سؤال)</button>
            </div>
            <div class="footer-note">
                كل وحدة تحتوي على 20 سؤالاً. الامتحان الشامل 50 سؤالاً عشوائياً من جميع الوحدات.
            </div>
        </div>

        <!-- شاشة الاختبار والنتيجة (تظهر بدلاً من القائمة عند البدء) -->
        <div id="quizScreen" class="hidden">
            <div class="quiz-header">
                <button class="back-btn" onclick="backToMenu()">🏠 العودة للرئيسية</button>
                <span class="progress" id="progressText">السؤال 1 / 20</span>
            </div>

            <!-- منطقة الاختبار (تظهر أثناء الاختبار) -->
            <div id="quizArea">
                <div class="question-box">
                    <div class="question-text" id="questionText">جار تحميل السؤال...</div>
                    <div class="options-grid" id="optionsContainer"></div>
                </div>
                <div class="nav-buttons">
                    <button class="nav-btn" id="prevBtn" onclick="goToPrevQuestion()">⬅️ السابق</button>
                </div>
                <div id="completionMessage" class="completion-message hidden"></div>
            </div>

            <!-- منطقة النتيجة (تظهر بعد انتهاء الاختبار) -->
            <div id="resultArea" class="hidden">
                <div class="result-box">
                    <div class="score-card" id="scoreCard">
                        <span class="score-number" id="scoreValue">0</span>
                        <span class="score-text">من المجموع <span id="totalQuestionsValue">0</span></span>
                    </div>
                    <h2>مراجعة الإجابات:</h2>
                    <div id="answersReview" class="answers-review"></div>
                    <button class="back-btn" style="width: 100%; margin-top: 20px;" onclick="backToMenu()">العودة للقائمة الرئيسية</button>
                </div>
            </div>
        </div>
    </div>

                { question: "The last part of a joke that makes it funny is the ________.", options: ["plot", "cast", "punchline", "sitcom"], correct: 2 },
                { question: "A funny television programme with the same characters every week is a ________.", options: ["documentary", "sitcom", "tragedy", "stand-up routine"], correct: 1 },
                { question: "To ________ a joke means to tell a joke.", options: ["cast", "crack", "plot", "heckle"], correct: 1 },
                { question: "Something that is very large is ________.", options: ["hollow", "enormous", "solid", "circular"], correct: 1 },
                { question: "A statue made of a yellowish-brown metal is made of ________.", options: ["silk", "bronze", "threads", "dye"], correct: 1 },
                { question: "________ Mathematics, she was used to making calculations.", options: ["Study", "Having studied", "Studies", "To study"], correct: 1 }
            ]
        };

        // --- متغيرات التطبيق العامة ---
        let currentScreen = 'menu';
        let currentUnit = null;
        let currentQuestions = [];
        let userAnswers = [];
        let currentQuestionIndex = 0;
        let autoTransitionTimer = null;

        // دوال مساعدة
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        // --- دوال الانتقال بين الشاشات ---
        function showMenu() {
            document.getElementById('menuScreen').classList.remove('hidden');
            document.getElementById('quizScreen').classList.add('hidden');
            currentScreen = 'menu';
            // إلغاء أي مؤقت موجود
            if (autoTransitionTimer) {
                clearTimeout(autoTransitionTimer);
                autoTransitionTimer = null;
            }
        }

        function showQuiz() {
            document.getElementById('menuScreen').classList.add('hidden');
            document.getElementById('quizScreen').classList.remove('hidden');
            document.getElementById('quizArea').classList.remove('hidden');
            document.getElementById('resultArea').classList.add('hidden');
            document.getElementById('completionMessage').classList.add('hidden');
            currentScreen = 'quiz';
        }

        function showResult() {
            document.getElementById('quizArea').classList.add('hidden');
            document.getElementById('resultArea').classList.remove('hidden');
            renderResult();
        }

        function backToMenu() {
            showMenu();
            currentUnit = null;
            currentQuestions = [];
            userAnswers = [];
            currentQuestionIndex = 0;
            if (autoTransitionTimer) {
                clearTimeout(autoTransitionTimer);
                autoTransitionTimer = null;
            }
        }

        // --- دوال بدء الاختبارات ---
        function startUnit(unitIndex) {
            const unitKeys = ['unit1', 'unit2', 'unit3', 'unit4', 'unit5'];
            currentUnit = unitKeys[unitIndex];
            currentQuestions = JSON.parse(JSON.stringify(fullQuestionBank[currentUnit]));
            userAnswers = new Array(currentQuestions.length).fill(null);
            currentQuestionIndex = 0;
            showQuiz();
            renderQuestion();
        }

        function startComprehensive() {
            currentUnit = 'comprehensive';
            let allQuestions = [];
            for (let unit in fullQuestionBank) {
                allQuestions = allQuestions.concat(fullQuestionBank[unit]);
            }
            allQuestions = shuffleArray(allQuestions);
            currentQuestions = allQuestions.slice(0, 50).map(q => ({...q}));
            userAnswers = new Array(currentQuestions.length).fill(null);
            currentQuestionIndex = 0;
            showQuiz();
            renderQuestion();
        }

        // --- دوال عرض الأسئلة والتفاعل ---
        function renderQuestion() {
            if (currentQuestions.length === 0) return;

            // إلغاء أي مؤقت سابق
            if (autoTransitionTimer) {
                clearTimeout(autoTransitionTimer);
                autoTransitionTimer = null;
            }

            const q = currentQuestions[currentQuestionIndex];
            document.getElementById('questionText').textContent = q.question;
            document.getElementById('progressText').textContent = `السؤال ${currentQuestionIndex + 1} / ${currentQuestions.length}`;
            document.getElementById('completionMessage').classList.add('hidden');

            const optionsContainer = document.getElementById('optionsContainer');
            optionsContainer.innerHTML = '';
            
            q.options.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                if (userAnswers[currentQuestionIndex] === index) {
                    btn.classList.add('selected');
                }
                btn.textContent = opt;
                btn.onclick = () => selectOption(index);
                optionsContainer.appendChild(btn);
            });

            // تحديث حالة زر السابق
            document.getElementById('prevBtn').disabled = currentQuestionIndex === 0;
        }

        function selectOption(optionIndex) {
            // تسجيل الإجابة
            userAnswers[currentQuestionIndex] = optionIndex;
            
            // تحديث شكل الزر المحدد
            const optionBtns = document.querySelectorAll('.option-btn');
            optionBtns.forEach((btn, idx) => {
                if (idx === optionIndex) {
                    btn.classList.add('selected');
                } else {
                    btn.classList.remove('selected');
                }
            });

            // التنقل التلقائي إلى السؤال التالي إذا لم يكن الأخير
            if (currentQuestionIndex < currentQuestions.length - 1) {
                // نستخدم تأخير بسيط لرؤية التأثير قبل الانتقال
                if (autoTransitionTimer) {
                    clearTimeout(autoTransitionTimer);
                }
                autoTransitionTimer = setTimeout(() => {
                    currentQuestionIndex++;
                    renderQuestion();
                    autoTransitionTimer = null;
                }, 500); // نصف ثانية تأخير
            } else {
                // إذا كان هذا هو السؤال الأخير، نعرض النتيجة بعد تسجيل الإجابة مباشرة
                if (autoTransitionTimer) {
                    clearTimeout(autoTransitionTimer);
                }
                autoTransitionTimer = setTimeout(() => {
                    showResult();
                    autoTransitionTimer = null;
                }, 700);
            }
        }

        function goToPrevQuestion() {
            if (currentQuestionIndex > 0) {
                // إلغاء أي مؤقت موجود
                if (autoTransitionTimer) {
                    clearTimeout(autoTransitionTimer);
                    autoTransitionTimer = null;
                }
                currentQuestionIndex--;
                renderQuestion();
            }
        }

        // --- دالة عرض النتيجة ---
        function renderResult() {
            const totalQuestions = currentQuestions.length;
            let correctCount = 0;
            
            userAnswers.forEach((ans, idx) => {
                if (ans !== null && ans === currentQuestions[idx].correct) {
                    correctCount++;
                }
            });

            document.getElementById('scoreValue').textContent = correctCount;
            document.getElementById('totalQuestionsValue').textContent = totalQuestions;

            const reviewContainer = document.getElementById('answersReview');
            reviewContainer.innerHTML = '';

            currentQuestions.forEach((q, idx) => {
                const userAnsIndex = userAnswers[idx];
                const userAnsText = userAnsIndex !== null ? q.options[userAnsIndex] : 'لم تجب';
                const correctAnsText = q.options[q.correct];
                const isCorrect = (userAnsIndex !== null && userAnsIndex === q.correct);

                const reviewDiv = document.createElement('div');
                reviewDiv.className = `review-item ${isCorrect ? 'correct' : 'incorrect'}`;
                
                let answerHtml = '';
                if (isCorrect) {
                    answerHtml = `<span class="user-answer correct-answer">✅ إجابتك: ${userAnsText}</span>`;
                } else {
                    answerHtml = `
                        <span class="user-answer wrong-answer">❌ إجابتك: ${userAnsText}</span><br>
                        <span class="correct-answer">✓ الإجابة الصحيحة: ${correctAnsText}</span>
                    `;
                }

                reviewDiv.innerHTML = `
                    <p><strong>سؤال ${idx + 1}:</strong> ${q.question}</p>
                    <p>${answerHtml}</p>
                `;
                reviewContainer.appendChild(reviewDiv);
            });
        }

        // ربط الدوال بالنطاق العام
        window.startUnit = startUnit;
        window.startComprehensive = startComprehensive;
        window.backToMenu = backToMenu;
        window.goToPrevQuestion = goToPrevQuestion;
        window.selectOption = selectOption;
    </script>
</body>
</html>
